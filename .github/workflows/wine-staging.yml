name: wine-staging

on:
  workflow_dispatch:
  push:
    branches:
     - master
    paths:
     - multilib/wine-staging/.SRCINFO
     - .github/workflows/wine-staging.yml

jobs:
  repository:
    strategy:
      matrix:
        include:
          - repository: public
            pkgbuild: PKGBUILD
            multilib: true
          - repository: personal
            pkgbuild: PKGBUILD.wow64
            multilib: false
    uses: ./.github/workflows/job_pkgrepo.yml
    with:
      pkgdir: multilib/wine-staging
      repository: ${{ matrix.repository }}
      pkgbuild: ${{ matrix.pkgbuild }}
      multilib: ${{ matrix.multilib }}

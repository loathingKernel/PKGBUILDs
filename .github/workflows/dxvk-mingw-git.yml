name: dxvk-mingw-git

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 */3 * *'
  push:
    branches:
     - master
    paths:
     - local/dxvk-mingw-git/.SRCINFO
     - .github/workflows/dxvk-mingw-git.yml

jobs:
  repository:
    strategy:
      matrix:
        repository: [public, personal]
    uses: ./.github/workflows/job_pkgrepo.yml
    with:
      pkgdir: local/dxvk-mingw-git
      repository: ${{ matrix.repository }}

name: dxvk-mingw-git

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 */3 * *'
  push:
    branches:
     - master
    paths:
     - local/dxvk-mingw-git/.SRCINFO

jobs:
  repository:
    strategy:
      matrix:
        include:
          - repository: public
            pkgbuild: PKGBUILD
          - repository: personal
            pkgbuild: PKGBUILD.personal
    uses: ./.github/workflows/job_pkgrepo.yml
    with:
      pkgdir: local/dxvk-mingw-git
      repository: ${{ matrix.repository }}
      pkgbuild: ${{ matrix.pkgbuild }}

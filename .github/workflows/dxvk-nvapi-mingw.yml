name: dxvk-nvapi-mingw

on:
  workflow_dispatch:
  push:
    branches:
     - master
    paths:
     - public/dxvk-nvapi-mingw/.SRCINFO
     - .github/workflows/dxvk-nvapi-mingw.yml

jobs:
  repository:
    strategy:
      matrix:
        include:
          - repository: public
            pkgbuild: PKGBUILD
            action: build
          - repository: personal
            pkgbuild: PKGBUILD.personal
            action: remove
    uses: ./.github/workflows/job_pkgrepo.yml
    with:
      pkgdir: public/dxvk-nvapi-mingw
      repository: ${{ matrix.repository }}
      pkgbuild: ${{ matrix.pkgbuild }}
      action: $${{ matrix.action }}

name: rpcs3-git-personal

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 */7 * *'
  push:
    branches:
     - master
    paths:
     - 'aur/rpcs3-git/.SRCINFO'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Makepkg Build and Check
      id: makepkg
      uses: loathingkernel/pkgbuild-action@master
      with:
        pkgdir: "aur/rpcs3-git"
        pacmanConf: "misc/personal_pacman.conf"
        makepkgConf: "misc/personal_makepkg.conf"
        makepkgArgs: -p PKGBUILD
        repoReleaseTag: "personal"
    - name: Print Package Files
      run: |
        echo "Successfully created the following package archive"
        echo "Package: ${{ steps.makepkg.outputs.pkgfile0 }}"
        echo "Repo: ${{ steps.makepkg.outputs.repofile0 }}"
        echo "Repo: ${{ steps.makepkg.outputs.repofile1 }}"
        echo "Repo: ${{ steps.makepkg.outputs.repofile2 }}"
        echo "Repo: ${{ steps.makepkg.outputs.repofile3 }}"
    - uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{secrets.GITHUB_TOKEN}}
        tag: personal
        file: ${{ steps.makepkg.outputs.pkgfile0 }}
        overwrite: true
    - uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{secrets.GITHUB_TOKEN}}
        tag: personal
        file: ${{ steps.makepkg.outputs.repofile0 }}
        overwrite: true
    - uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{secrets.GITHUB_TOKEN}}
        tag: personal
        file: ${{ steps.makepkg.outputs.repofile1 }}
        overwrite: true
    - uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{secrets.GITHUB_TOKEN}}
        tag: personal
        file: ${{ steps.makepkg.outputs.repofile2 }}
        overwrite: true
    - uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{secrets.GITHUB_TOKEN}}
        tag: personal
        file: ${{ steps.makepkg.outputs.repofile3 }}
        overwrite: true

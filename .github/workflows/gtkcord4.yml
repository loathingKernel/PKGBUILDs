name: gtkcord4

on:
  workflow_dispatch:
  push:
    branches:
     - master
    paths:
     - aur/gtkcord4/.SRCINFO

jobs:
  repository:
    strategy:
      matrix:
        repository: [public]
    uses: ./.github/workflows/job_pkgrepo.yml
    with:
      pkgdir: aur/gtkcord4
      repository: ${{ matrix.repository }}
      action: remove

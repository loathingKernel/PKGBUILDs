name: dxvk-mingw

on:
  workflow_dispatch:
  push:
    branches:
     - master
    paths:
     - public/dxvk-mingw/.SRCINFO
     - .github/workflows/dxvk-mingw.yml

jobs:
  repository:
    strategy:
      matrix:
        repository: [public, personal]
    uses: ./.github/workflows/job_pkgrepo.yml
    with:
      pkgdir: public/dxvk-mingw
      repository: ${{ matrix.repository }}

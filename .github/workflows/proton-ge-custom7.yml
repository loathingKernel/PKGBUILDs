name: proton-ge-custom7

on:
  workflow_dispatch:
  push:
    branches:
     - master
    paths:
     - local/proton-ge-custom7/.SRCINFO

env:
  path: local/proton-git-custom7
  repo: true


jobs:
  jenv:
    runs-on: ubuntu-latest
    outputs:
      path: ${{ env.path }}
      repo: ${{ env.repo }}
  build:
    needs: jenv
    if: ${{ needs.jenv.outputs.repo == 'true' }}
    strategy:
      matrix:
        include:
          - repo: public
            pkgbuild: PKGBUILD
          - repo: personal
            pkgbuild: PKGBUILD.personal
    uses: ./.github/workflows/pkgbuild.yml
    with:
      pkgdir: ${{ needs.jenv.outputs.path }}
      pacman_conf: .github/conf/${{ matrix.repo }}_pacman.conf
      makepkg_conf: .github/conf/${{ matrix.repo }}_makepkg.conf
      makepkg_args: -p ${{ matrix.pkgbuild }}
      multilib: true
      release_tag: loathk-${{ matrix.repo }}
  delete:
    needs: jenv
    if: ${{ needs.jenv.outputs.repo == 'false' }}
    strategy:
      matrix:
        repo: [public, personal]
    uses: ./.github/workflows/pkgdelete.yml
    with:
      pkgdir: ${{ needs.jenv.outputs.path }}
      release_tag: loathk-${{ matrix.repo }}

name: proton-ge-custom7

on:
  workflow_dispatch:
  push:
    branches:
     - master
    paths:
     - local/proton-ge-custom7/.SRCINFO

jobs:
  repository:
    strategy:
      matrix:
        include:
          - repository: public
            pkgbuild: PKGBUILD
          - repository: personal
            pkgbuild: PKGBUILD.personal
    uses: ./.github/workflows/job_pkgrepo.yml
    with:
      pkgdir: local/proton-ge-custom7
      multilib: true
      repository: ${{ matrix.repository }}
      pkgbuild: ${{ matrix.pkgbuild }}
      action: skip
